<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formulário para Manutenção da Parceria</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a2e;
      --ink-soft: #3d3d5c;
      --ink-muted: #8888aa;
      --accent: #c8102e;
      --accent-light: #f5e6e9;
      --line: #d8d8e8;
      --bg: #f7f6f2;
      --white: #ffffff;
      --field-bg: #fefefe;
      --shadow: 0 2px 20px rgba(26,26,46,0.08);
      --radius: 4px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      padding: 40px 20px 80px;
    }

    /* ── Page header ── */
    .page-header {
      max-width: 780px;
      margin: 0 auto 36px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo-mark {
      width: 44px; height: 44px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 20px; flex-shrink: 0;
    }
    .page-header h1 {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--ink-soft);
      letter-spacing: 0.01em;
    }
    .page-header h1 strong {
      display: block;
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--ink);
    }

    /* ── Card ── */
    .card {
      max-width: 780px;
      margin: 0 auto;
      background: var(--white);
      border-radius: 10px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-top {
      background: var(--ink);
      padding: 28px 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .form-title-wrap {
      flex: 1;
    }

    #formTitle {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      background: transparent;
      border: none;
      outline: none;
      width: 100%;
      cursor: text;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      padding-bottom: 4px;
      transition: border-color 0.2s;
    }
    #formTitle:focus {
      border-bottom-color: var(--accent);
    }
    .edit-hint {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.45);
      margin-top: 6px;
      display: flex; align-items: center; gap: 5px;
    }
    .edit-hint svg { width: 11px; height: 11px; }

    .badge {
      background: var(--accent);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 20px;
      white-space: nowrap;
    }

    /* ── Fields ── */
    .fields-section {
      padding: 36px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .field-row {
      display: grid;
      grid-template-columns: 280px 1fr;
      align-items: stretch;
      border-bottom: 1px solid var(--line);
      transition: background 0.15s;
    }
    .field-row:first-child { border-top: 1px solid var(--line); }
    .field-row:hover { background: #faf9f7; }

    .field-label-wrap {
      padding: 16px 20px 16px 0;
      display: flex;
      align-items: center;
      gap: 10px;
      border-right: 2px solid var(--line);
      transition: border-color 0.2s;
    }
    .field-row:focus-within .field-label-wrap {
      border-right-color: var(--accent);
    }

    .field-num {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--bg);
      color: var(--ink-muted);
      font-size: 0.7rem;
      font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .field-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--ink-soft);
      line-height: 1.35;
      flex: 1;
    }

    .field-input-wrap {
      padding: 14px 0 14px 20px;
      display: flex;
      align-items: center;
    }

    .field-input {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 400;
      color: var(--ink);
      background: transparent;
      border: none;
      outline: none;
      width: 100%;
      padding: 6px 10px;
      border-radius: var(--radius);
      transition: background 0.15s;
    }
    .field-input:focus {
      background: var(--accent-light);
    }
    .field-input::placeholder { color: var(--ink-muted); font-style: italic; }

    /* Recomendação — textarea */
    .field-row.big .field-input-wrap { align-items: flex-start; padding-top: 18px; }
    .field-row.big .field-label-wrap { align-items: flex-start; padding-top: 20px; }
    textarea.field-input {
      resize: vertical;
      min-height: 100px;
      line-height: 1.6;
    }

    /* ── Actions ── */
    .actions {
      padding: 24px 36px 32px;
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      flex-wrap: wrap;
      border-top: 1px solid var(--line);
    }

    .btn-email {
      background: #1a6b3c;
      color: #fff;
      display: flex; align-items: center; gap: 8px;
    }
    .btn-email:hover { opacity: 0.88; }
    .btn-email svg { width: 15px; height: 15px; flex-shrink: 0; }

    .btn-copy {
      background: #1a4a8a;
      color: #fff;
      display: flex; align-items: center; gap: 8px;
    }
    .btn-copy:hover { opacity: 0.88; }
    .btn-copy svg { width: 15px; height: 15px; flex-shrink: 0; }

    .btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 11px 24px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.02em;
    }
    .btn:active { transform: scale(0.98); }

    .btn-ghost {
      background: transparent;
      color: var(--ink-soft);
      border: 1px solid var(--line);
    }
    .btn-ghost:hover { background: var(--bg); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.88; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(60px);
      background: var(--ink); color: #fff;
      padding: 12px 22px; border-radius: 30px;
      font-size: 0.85rem; font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      opacity: 0; pointer-events: none; z-index: 100;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── Responsive ── */
    @media (max-width: 580px) {
      .field-row { grid-template-columns: 1fr; }
      .field-label-wrap { border-right: none; border-bottom: 1px solid var(--line); padding-bottom: 10px; }
      .field-input-wrap { padding-left: 0; padding-top: 10px; }
      .card-top { flex-direction: column; align-items: flex-start; }
      .fields-section, .actions { padding: 24px 20px; }
    }
  </style>
</head>
<body>

  <header class="page-header">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
    </div>
    <h1><strong>Formulário de Parceria</strong>Manutenção e Cadastro</h1>
  </header>

  <div class="card">
    <!-- Título editável -->
    <div class="card-top">
      <div class="form-title-wrap">
        <input
          id="formTitle"
          type="text"
          value="FORMULÁRIO PARA MANUTENÇÃO DA PARCERIA"
          title="Clique para editar o título"
          spellcheck="false"
        />
        <p class="edit-hint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          Título editável — clique para alterar
        </p>
      </div>
      <span class="badge">Parceria</span>
    </div>

    <!-- Campos do formulário -->
    <form id="partnerForm" class="fields-section" onsubmit="return false">

      <div class="field-row">
        <div class="field-label-wrap">
          <span class="field-num">1</span>
          <label class="field-label" for="razaoSocial">Razão Social</label>
        </div>
        <div class="field-input-wrap">
          <input class="field-input" id="razaoSocial" type="text" placeholder="Nome da empresa..." />
        </div>
      </div>

      <div class="field-row">
        <div class="field-label-wrap">
          <span class="field-num">2</span>
          <label class="field-label" for="nDN">Nº do DN</label>
        </div>
        <div class="field-input-wrap">
          <input class="field-input" id="nDN" type="text" placeholder="Número do DN..." />
        </div>
      </div>

      <div class="field-row">
        <div class="field-label-wrap">
          <span class="field-num">3</span>
          <label class="field-label" for="cnpj">CNPJ</label>
        </div>
        <div class="field-input-wrap">
          <input class="field-input" id="cnpj" type="text" placeholder="00.000.000/0000-00" maxlength="18" />
        </div>
      </div>

      <div class="field-row">
        <div class="field-label-wrap">
          <span class="field-num">4</span>
          <label class="field-label" for="gcm">GCM</label>
        </div>
        <div class="field-input-wrap">
          <input class="field-input" id="gcm" type="text" placeholder="GCM responsável..." />
        </div>
      </div>

      <div class="field-row">
        <div class="field-label-wrap">
          <span class="field-num">5</span>
          <label class="field-label" for="tipoParceiro">Tipo de parceiro</label>
        </div>
        <div class="field-input-wrap">
          <select class="field-input" id="tipoParceiro" style="cursor:pointer">
            <option value="" disabled selected>Selecione...</option>
            <option value="loja">Loja</option>
            <option value="concessionaria">Concessionária</option>
          </select>
        </div>
      </div>

      <div class="field-row">
        <div class="field-label-wrap">
          <span class="field-num">6</span>
          <label class="field-label" for="dataFundacao">Data de fundação da empresa</label>
        </div>
        <div class="field-input-wrap">
          <input class="field-input" id="dataFundacao" type="date" />
        </div>
      </div>

      <div class="field-row">
        <div class="field-label-wrap">
          <span class="field-num">7</span>
          <label class="field-label" for="dataNomeacao">Data da nomeação</label>
        </div>
        <div class="field-input-wrap">
          <input class="field-input" id="dataNomeacao" type="date" />
        </div>
      </div>

      <div class="field-row">
        <div class="field-label-wrap">
          <span class="field-num">8</span>
          <label class="field-label" for="mediaContratos">Média de contratos em quantidade<br>(últimos 6 meses)</label>
        </div>
        <div class="field-input-wrap">
          <input class="field-input" id="mediaContratos" type="number" min="0" placeholder="0" />
        </div>
      </div>

      <div class="field-row">
        <div class="field-label-wrap">
          <span class="field-num">9</span>
          <label class="field-label" for="restricoesEmpresa">Valor das restrições da empresa (R$)</label>
        </div>
        <div class="field-input-wrap">
          <input class="field-input" id="restricoesEmpresa" type="text" placeholder="R$ 0,00" />
        </div>
      </div>

      <div class="field-row">
        <div class="field-label-wrap">
          <span class="field-num">10</span>
          <label class="field-label" for="restricoesSocios">Valor das restrições do(s) sócio(s)</label>
        </div>
        <div class="field-input-wrap">
          <input class="field-input" id="restricoesSocios" type="text" placeholder="R$ 0,00" />
        </div>
      </div>

      <div class="field-row big">
        <div class="field-label-wrap">
          <span class="field-num">11</span>
          <label class="field-label" for="recomendacao">Recomendação</label>
        </div>
        <div class="field-input-wrap">
          <textarea class="field-input" id="recomendacao" placeholder="Descreva a recomendação..."></textarea>
        </div>
      </div>

    </form>

    <!-- Botões -->
    <div class="actions">
      <button class="btn btn-ghost" onclick="clearForm()">Limpar</button>
      <button class="btn btn-primary" onclick="saveForm()">Salvar</button>
      <button class="btn btn-email" onclick="sendEmail()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="m2 7 10 7 10-7"/>
        </svg>
        Abrir E-mail
      </button>
      <button class="btn btn-copy" onclick="copyHtmlEmail()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        Copiar para colar no E-mail
      </button>
    </div>
  </div>

  <div id="toast">✓ Formulário salvo com sucesso!</div>

  <script>
    // ── Helpers ──
    function g(id) { return document.getElementById(id).value.trim(); }

    // Máscara CNPJ
    document.getElementById('cnpj').addEventListener('input', function() {
      let v = this.value.replace(/\D/g, '').slice(0, 14);
      v = v.replace(/^(\d{2})(\d)/, '$1.$2');
      v = v.replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3');
      v = v.replace(/\.(\d{3})(\d)/, '.$1/$2');
      v = v.replace(/(\d{4})(\d)/, '$1-$2');
      this.value = v;
    });

    // Máscara valor monetário
    ['restricoesEmpresa', 'restricoesSocios'].forEach(id => {
      document.getElementById(id).addEventListener('blur', function() {
        let raw = this.value.replace(/[^\d,]/g, '').replace(',', '.');
        if (raw && !isNaN(parseFloat(raw))) {
          this.value = 'R$ ' + parseFloat(raw).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
        }
      });
    });

    // Formata data DD/MM/AAAA
    function fmtDate(val) {
      if (!val) return '—';
      const [y, m, d] = val.split('-');
      return `${d}/${m}/${y}`;
    }

    function clearForm() {
      if (!confirm('Deseja limpar todos os campos?')) return;
      document.getElementById('partnerForm').reset();
      document.getElementById('formTitle').value = 'FORMULÁRIO PARA MANUTENÇÃO DA PARCERIA';
    }

    function saveForm() {
      const data = {
        titulo: g('formTitle'),
        razaoSocial: g('razaoSocial'),
        nDN: g('nDN'),
        cnpj: g('cnpj'),
        gcm: g('gcm'),
        tipoParceiro: g('tipoParceiro'),
        dataFundacao: g('dataFundacao'),
        dataNomeacao: g('dataNomeacao'),
        mediaContratos: g('mediaContratos'),
        restricoesEmpresa: g('restricoesEmpresa'),
        restricoesSocios: g('restricoesSocios'),
        recomendacao: g('recomendacao'),
        savedAt: new Date().toISOString()
      };
      localStorage.setItem('parceriaForm', JSON.stringify(data));
      showToast('✓ Formulário salvo!');
    }

    // ── Enviar por e-mail via mailto ──
    function sendEmail() {
      const titulo    = g('formTitle') || 'FORMULÁRIO PARA MANUTENÇÃO DA PARCERIA';
      const razao     = g('razaoSocial') || '—';
      const nDN       = g('nDN')       || '—';
      const cnpj      = g('cnpj')      || '—';
      const gcm       = g('gcm')       || '—';
      const tipo      = g('tipoParceiro') || '—';
      const fundacao  = fmtDate(g('dataFundacao'));
      const nomeacao  = fmtDate(g('dataNomeacao'));
      const media     = g('mediaContratos') || '—';
      const restEmp   = g('restricoesEmpresa') || '—';
      const restSoc   = g('restricoesSocios') || '—';
      const recom     = g('recomendacao') || '—';

      // Assunto dinâmico
      const subject = `Monitoramento do Serasa - ${cnpj} - ${razao}`;

      // Corpo em texto puro (compatível com qualquer cliente de e-mail)
      const sep   = '================================================';
      const line  = '------------------------------------------------';
      const body  =
`${sep}
${titulo}
${sep}

1. Razão Social ............: ${razao}
2. Nº do DN ................: ${nDN}
3. CNPJ ....................: ${cnpj}
4. GCM .....................: ${gcm}
${line}
5. Tipo de parceiro ........: ${tipo}
6. Data de fundação ........: ${fundacao}
7. Data da nomeação ........: ${nomeacao}
${line}
8. Média de contratos (6m) .: ${media}
9. Restrições da empresa ...: ${restEmp}
10. Restrições do(s) sócio(s): ${restSoc}
${sep}
RECOMENDAÇÃO:

${recom}
${sep}`;

      // Monta o link mailto
      const mailto = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

      // Abre o cliente de e-mail
      window.location.href = mailto;
      showToast('📧 Abrindo seu cliente de e-mail...');
    }

    // ── Copiar HTML formatado para colar no e-mail ──
    function buildEmailHtml() {
      const titulo   = g('formTitle') || 'FORMULÁRIO PARA MANUTENÇÃO DA PARCERIA';
      const razao    = g('razaoSocial') || '';
      const nDN      = g('nDN')       || '';
      const cnpj     = g('cnpj')      || '';
      const gcm      = g('gcm')       || '';
      const tipo     = g('tipoParceiro') || '';
      const fundacao = fmtDate(g('dataFundacao'));
      const nomeacao = fmtDate(g('dataNomeacao'));
      const media    = g('mediaContratos') || '';
      const restEmp  = g('restricoesEmpresa') || '';
      const restSoc  = g('restricoesSocios') || '';
      const recom    = g('recomendacao') || '';

      const row = (label, value) => `
        <tr>
          <td style="border:1px solid #000;padding:7px 10px;font-family:Arial,sans-serif;font-size:13px;">
            <b>${label}</b> ${value}
          </td>
        </tr>`;

      return `
        <table style="border-collapse:collapse;width:650px;border:1px solid #000;font-family:Arial,sans-serif;font-size:13px;">
          <thead>
            <tr>
              <th style="border:1px solid #000;padding:10px;text-align:center;font-size:14px;">
                <u><b>${titulo}</b></u>
              </th>
            </tr>
          </thead>
          <tbody>
            ${row('Razão Social:', razao)}
            ${row('Nº do DN:', nDN)}
            ${row('CNPJ:', cnpj)}
            ${row('GCM:', gcm)}
            ${row('Tipo de parceiros (Lojas ou Concessionárias):', tipo)}
            ${row('Data de fundação da empresa:', fundacao)}
            ${row('Data da nomeação:', nomeacao)}
            ${row('Média de contratos em quantidade dos últimos 6 meses:', media)}
            ${row('Valor das restrições da empresa:', restEmp)}
            ${row('Valor das restrições do(s) sócio(s):', restSoc)}
            ${row('RECOMENDAÇÃO:', recom)}
          </tbody>
        </table>`;
    }

    async function copyHtmlEmail() {
      const html = buildEmailHtml();
      try {
        // ClipboardItem com HTML rico — funciona no Chrome/Edge e Outlook
        const blob = new Blob([html], { type: 'text/html' });
        const item = new ClipboardItem({ 'text/html': blob });
        await navigator.clipboard.write([item]);
        showToast('✅ Copiado! Agora abra o e-mail e cole (Ctrl+V)');
      } catch(e) {
        // Fallback: cria elemento invisível e executa copy
        const el = document.createElement('div');
        el.innerHTML = html;
        el.style.cssText = 'position:fixed;left:-9999px;top:0';
        document.body.appendChild(el);
        const range = document.createRange();
        range.selectNode(el);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
        window.getSelection().removeAllRanges();
        document.body.removeChild(el);
        showToast('✅ Copiado! Agora abra o e-mail e cole (Ctrl+V)');
      }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3500);
    }

    // Restaurar dados salvos ao carregar
    window.addEventListener('load', () => {
      const saved = localStorage.getItem('parceriaForm');
      if (!saved) return;
      try {
        const d = JSON.parse(saved);
        const set = (id, val) => { if (val) document.getElementById(id).value = val; };
        set('formTitle', d.titulo);
        set('razaoSocial', d.razaoSocial);
        set('nDN', d.nDN);
        set('cnpj', d.cnpj);
        set('gcm', d.gcm);
        set('tipoParceiro', d.tipoParceiro);
        set('dataFundacao', d.dataFundacao);
        set('dataNomeacao', d.dataNomeacao);
        set('mediaContratos', d.mediaContratos);
        set('restricoesEmpresa', d.restricoesEmpresa);
        set('restricoesSocios', d.restricoesSocios);
        set('recomendacao', d.recomendacao);
      } catch(e) {}
    });
  </script>
</body>
</html>
